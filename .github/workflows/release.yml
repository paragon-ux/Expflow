name: Release

on:
  push:
    tags:
      - 'v*.*.*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  RELEASE_TAG: v1.0.1
  RELEASE_VERSION: 1.0.1
  NPM_PACKAGE: expflow
  PYPI_PACKAGE: expflow-hooks
  PYTHON_IMPORT: expflow_hooks

jobs:
  build-release:
    name: Build release artifacts
    runs-on: ubuntu-latest
    outputs:
      commit-sha: ${{ steps.identity.outputs.commit_sha }}
    steps:
      - name: Check out tag
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22.14.0
          cache: ''

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'

      - name: Verify release identity
        id: identity
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_TYPE}" != "tag" ]]; then
            echo "Release workflow must run from a tag" >&2
            exit 1
          fi
          if [[ ! "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Tag must match vMAJOR.MINOR.PATCH" >&2
            exit 1
          fi
          if [[ "${GITHUB_REF_NAME}" != "${RELEASE_TAG}" ]]; then
            echo "Only ${RELEASE_TAG} is authorized by this release workflow" >&2
            exit 1
          fi
          git fetch origin main
          TAG_SHA="$(git rev-parse HEAD)"
          MAIN_SHA="$(git rev-parse origin/main)"
          if [[ "${TAG_SHA}" != "${MAIN_SHA}" ]]; then
            echo "Tag commit ${TAG_SHA} differs from origin/main ${MAIN_SHA}" >&2
            exit 1
          fi
          echo "commit_sha=${TAG_SHA}" >> "${GITHUB_OUTPUT}"

      - name: Verify package versions
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import pathlib
          import re
          import tomllib

          root = pathlib.Path(".")
          package_json = json.loads((root / "package.json").read_text())
          package_lock = json.loads((root / "package-lock.json").read_text())
          pyproject = tomllib.loads((root / "pyproject.toml").read_text())
          version_ts = (root / "src" / "core" / "version.ts").read_text()

          assert package_json["name"] == "expflow"
          assert package_json["version"] == "1.0.1"
          assert package_json["license"] == "MIT"
          assert package_json.get("publishConfig", {}).get("access") == "public"
          assert package_lock["packages"][""]["name"] == "expflow"
          assert package_lock["packages"][""]["version"] == "1.0.1"
          assert pyproject["project"]["name"] == "expflow-hooks"
          assert pyproject["project"]["version"] == "1.0.1"
          assert pyproject["project"]["license"] == "MIT"
          assert re.search(r"VERSION\s*=\s*'1\.0\.1'", version_ts)
          PY

      - name: Install Node dependencies
        run: npm ci

      - name: Full repository validation
        run: npm run validate

      - name: Install Python release dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Python tests
        run: python -m pytest

      - name: Build TypeScript
        run: npm run build

      - name: Build exact npm tarball
        id: npm_pack
        run: |
          set -euo pipefail
          mkdir -p release-artifacts/npm
          NPM_TARBALL_NAME="$(npm pack --pack-destination release-artifacts/npm)"
          NPM_TARBALL="release-artifacts/npm/${NPM_TARBALL_NAME}"
          test -f "${NPM_TARBALL}"
          if [[ "${NPM_TARBALL_NAME}" != "expflow-1.0.1.tgz" ]]; then
            echo "Unexpected npm tarball ${NPM_TARBALL_NAME}" >&2
            exit 1
          fi
          echo "tarball=${NPM_TARBALL}" >> "${GITHUB_OUTPUT}"

      - name: Build exact Python distributions
        run: |
          set -euo pipefail
          mkdir -p release-artifacts/python
          python -m build --sdist --wheel --outdir release-artifacts/python
          test -f release-artifacts/python/expflow_hooks-1.0.1-py3-none-any.whl
          test -f release-artifacts/python/expflow_hooks-1.0.1.tar.gz

      - name: Check Python distribution metadata
        run: python -m twine check release-artifacts/python/*

      - name: Verify exact npm tarball externally
        run: npx tsx tests/contracts/package-verify.ts --tarball "${{ steps.npm_pack.outputs.tarball }}"

      - name: Verify exact Python wheel externally
        run: python tests/contracts/verify_python_wheel.py --wheel release-artifacts/python/expflow_hooks-1.0.1-py3-none-any.whl

      - name: Generate release checksums and manifest
        run: |
          set -euo pipefail
          node --input-type=module <<'NODE'
          import { createHash } from 'node:crypto';
          import { execSync } from 'node:child_process';
          import { readFileSync, writeFileSync } from 'node:fs';

          const artifactPaths = [
            'release-artifacts/npm/expflow-1.0.1.tgz',
            'release-artifacts/python/expflow_hooks-1.0.1.tar.gz',
            'release-artifacts/python/expflow_hooks-1.0.1-py3-none-any.whl',
          ];

          const digest = (path) =>
            createHash('sha256').update(readFileSync(path)).digest('hex');

          const sh = (command) => execSync(command, { encoding: 'utf8' }).trim();

          const manifest = {
            repository: 'paragon-ux/Expflow',
            commit_sha: process.env.GITHUB_SHA,
            tag: process.env.RELEASE_TAG,
            packages: {
              npm: { name: process.env.NPM_PACKAGE, version: process.env.RELEASE_VERSION },
              pypi: { name: process.env.PYPI_PACKAGE, version: process.env.RELEASE_VERSION },
            },
            artifacts: artifactPaths.map((path) => ({
              path: path.replace('release-artifacts/', ''),
              sha256: digest(path),
            })),
            build_tools: {
              node: sh('node --version'),
              npm: sh('npm --version'),
              python: sh('python --version'),
              build: sh('python -m build --version'),
              twine: sh('python -m twine --version'),
            },
            validation_summary: [
              'npm ci',
              'npm run validate',
              'python -m pytest',
              'python -m twine check',
              'external npm tarball verification',
              'external Python wheel verification',
            ],
          };

          writeFileSync(
            'release-artifacts/release-manifest.json',
            JSON.stringify(manifest, null, 2) + '\n',
          );
          NODE
          (
            cd release-artifacts
            sha256sum npm/expflow-1.0.1.tgz python/expflow_hooks-1.0.1.tar.gz python/expflow_hooks-1.0.1-py3-none-any.whl release-manifest.json > SHA256SUMS
            sha256sum -c SHA256SUMS
          )

      - name: Upload release artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: release-artifacts-v1.0.1
          path: release-artifacts/
          if-no-files-found: error
          retention-days: 90

  attest-release:
    name: Attest release artifacts
    runs-on: ubuntu-latest
    needs: build-release
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: release-artifacts-v1.0.1
          path: release-artifacts

      - name: Verify checksums
        run: |
          set -euo pipefail
          cd release-artifacts
          sha256sum -c SHA256SUMS

      - name: Attest npm tarball
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2.4.0
        with:
          subject-path: release-artifacts/npm/expflow-1.0.1.tgz

      - name: Attest Python sdist
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2.4.0
        with:
          subject-path: release-artifacts/python/expflow_hooks-1.0.1.tar.gz

      - name: Attest Python wheel
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2.4.0
        with:
          subject-path: release-artifacts/python/expflow_hooks-1.0.1-py3-none-any.whl

      - name: Attest release manifest
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2.4.0
        with:
          subject-path: release-artifacts/release-manifest.json

  publish-npm:
    name: Publish npm package
    runs-on: ubuntu-latest
    needs: [build-release, attest-release]
    environment: release-npm
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22.14.0
          registry-url: https://registry.npmjs.org
          cache: ''

      - name: Install npm 11.5.1
        run: npm install --global npm@11.5.1

      - name: Download release artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: release-artifacts-v1.0.1
          path: release-artifacts

      - name: Verify checksums
        run: |
          set -euo pipefail
          cd release-artifacts
          sha256sum -c SHA256SUMS

      - name: Publish or verify npm package
        run: |
          set -euo pipefail
          TARBALL="release-artifacts/npm/expflow-1.0.1.tgz"
          if [[ ! -f "${TARBALL}" ]]; then
            echo "Missing ${TARBALL}" >&2
            exit 1
          fi
          node - <<'NODE'
          const fs = require('fs');
          const tarball = 'release-artifacts/npm/expflow-1.0.1.tgz';
          if (!fs.existsSync(tarball)) process.exit(1);
          NODE
          if npm view expflow@1.0.1 version --json > npm-existing.json 2>/dev/null; then
            echo "expflow@1.0.1 already exists; verifying metadata"
            PUBLISHED="already-published"
          else
            unset NODE_AUTH_TOKEN
            npm publish "${TARBALL}" --access public --provenance
            PUBLISHED="published"
          fi
          npm view expflow@1.0.1 --json > npm-metadata.json
          node <<'NODE'
          const fs = require('fs');
          const metadata = JSON.parse(fs.readFileSync('npm-metadata.json', 'utf8'));
          if (metadata.name !== 'expflow') throw new Error('Unexpected npm package name');
          if (metadata.version !== '1.0.1') throw new Error('Unexpected npm version');
          if (metadata.license !== 'MIT') throw new Error('Unexpected npm license');
          if (!metadata.dist?.tarball || !metadata.dist?.integrity) {
            throw new Error('Missing npm dist tarball or integrity');
          }
          if (
            !metadata.dist?.provenance &&
            !metadata.dist?.attestations &&
            !metadata.dist?.signatures
          ) {
            throw new Error('Missing npm provenance or signature metadata');
          }
          const repo = metadata.repository?.url || '';
          if (!repo.includes('github.com/paragon-ux/Expflow')) {
            throw new Error(`Unexpected npm repository metadata: ${repo}`);
          }
          NODE
          TARBALL_URL="$(node -e "console.log(JSON.parse(require('fs').readFileSync('npm-metadata.json', 'utf8')).dist.tarball)")"
          curl -fsSL "${TARBALL_URL}" -o npm-registry.tgz
          test "$(sha256sum "${TARBALL}" | cut -d' ' -f1)" = "$(sha256sum npm-registry.tgz | cut -d' ' -f1)"
          printf '{"package":"expflow","version":"1.0.1","status":"%s"}\n' "${PUBLISHED}" > npm-publication-result.json

      - name: Upload npm publication result
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: npm-publication-result-v1.0.1
          path: |
            npm-publication-result.json
            npm-metadata.json
          if-no-files-found: error

  publish-pypi:
    name: Publish PyPI package
    runs-on: ubuntu-latest
    needs: [build-release, attest-release]
    environment: release-pypi
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'

      - name: Download release artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: release-artifacts-v1.0.1
          path: release-artifacts

      - name: Verify checksums
        run: |
          set -euo pipefail
          cd release-artifacts
          sha256sum -c SHA256SUMS

      - name: Check PyPI version state
        id: pypi_state
        run: |
          set -euo pipefail
          python - <<'PY' > pypi-state.json
          import json
          import urllib.error
          import urllib.request

          url = "https://pypi.org/pypi/expflow-hooks/1.0.1/json"
          try:
              with urllib.request.urlopen(url, timeout=30) as response:
                  data = json.load(response)
              print(json.dumps({"exists": True, "info": data.get("info", {})}))
          except urllib.error.HTTPError as exc:
              if exc.code == 404:
                  print(json.dumps({"exists": False}))
              else:
                  raise
          PY
          EXISTS="$(python -c "import json; print(str(json.load(open('pypi-state.json'))['exists']).lower())")"
          echo "exists=${EXISTS}" >> "${GITHUB_OUTPUT}"

      - name: Publish PyPI package
        if: steps.pypi_state.outputs.exists != 'true'
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          packages-dir: release-artifacts/python/
          attestations: true
          print-hash: true

      - name: Verify PyPI publication
        run: |
          set -euo pipefail
          python - <<'PY'
          import base64
          import hashlib
          import json
          import pathlib
          import tempfile
          import subprocess
          import sys
          import time
          import urllib.error
          import urllib.request

          url = "https://pypi.org/pypi/expflow-hooks/1.0.1/json"
          last_error = None
          for attempt in range(12):
              try:
                  with urllib.request.urlopen(url, timeout=60) as response:
                      data = json.load(response)
                  break
              except urllib.error.HTTPError as exc:
                  last_error = exc
                  if exc.code != 404 or attempt == 11:
                      raise
                  time.sleep(10)
          else:
              raise last_error
          info = data.get("info", {})
          if info.get("name") != "expflow-hooks":
              raise SystemExit("Unexpected PyPI project name")
          if info.get("version") != "1.0.1":
              raise SystemExit("Unexpected PyPI version")

          expected = {}
          for line in pathlib.Path("release-artifacts/SHA256SUMS").read_text().splitlines():
              digest, filename = line.split(None, 1)
              expected[pathlib.Path(filename).name] = digest

          seen = set()
          for file_info in data.get("urls", []):
              filename = file_info["filename"]
              if filename in expected:
                  seen.add(filename)
                  if file_info["digests"]["sha256"] != expected[filename]:
                      raise SystemExit(f"Digest mismatch for {filename}")
          missing = {
              "expflow_hooks-1.0.1.tar.gz",
              "expflow_hooks-1.0.1-py3-none-any.whl",
          } - seen
          if missing:
              raise SystemExit(f"Missing PyPI files: {sorted(missing)}")

          temp_dir = pathlib.Path(tempfile.mkdtemp(prefix="expflow-pypi-install-"))
          subprocess.run([sys.executable, "-m", "venv", str(temp_dir)], check=True)
          python = temp_dir / ("Scripts/python.exe" if sys.platform == "win32" else "bin/python")
          subprocess.run([str(python), "-m", "pip", "install", "expflow-hooks==1.0.1"], check=True)
          subprocess.run(
              [str(python), "-c", "import expflow_hooks; assert expflow_hooks.__version__ == '1.0.1'"],
              check=True,
          )
          pathlib.Path("pypi-publication-result.json").write_text(
              json.dumps({"package": "expflow-hooks", "version": "1.0.1", "status": "verified"}, indent=2)
              + "\n"
          )
          pathlib.Path("pypi-metadata.json").write_text(json.dumps(data, indent=2) + "\n")
          PY

      - name: Upload PyPI publication result
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: pypi-publication-result-v1.0.1
          path: |
            pypi-publication-result.json
            pypi-metadata.json
          if-no-files-found: error

  publish-github-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [build-release, publish-npm, publish-pypi]
    permissions:
      contents: write
    steps:
      - name: Check out tag
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Download release artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: release-artifacts-v1.0.1
          path: release-artifacts

      - name: Download npm publication result
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: npm-publication-result-v1.0.1
          path: registry-results/npm

      - name: Download PyPI publication result
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: pypi-publication-result-v1.0.1
          path: registry-results/pypi

      - name: Verify release prerequisites
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git fetch origin main
          TAG_SHA="$(git rev-parse HEAD)"
          MAIN_SHA="$(git rev-parse origin/main)"
          if [[ "${GITHUB_REF_NAME}" != "${RELEASE_TAG}" ]]; then
            echo "Unexpected release tag ${GITHUB_REF_NAME}" >&2
            exit 1
          fi
          if [[ "${TAG_SHA}" != "${MAIN_SHA}" ]]; then
            echo "Tag commit ${TAG_SHA} differs from origin/main ${MAIN_SHA}" >&2
            exit 1
          fi
          cd release-artifacts
          sha256sum -c SHA256SUMS
          cd ..
          test -f registry-results/npm/npm-publication-result.json
          test -f registry-results/pypi/pypi-publication-result.json
          if gh release view "${RELEASE_TAG}" --json tagName,targetCommitish,isDraft,isPrerelease,url > github-release.json 2>/dev/null; then
            node <<'NODE'
            const fs = require('fs');
            const release = JSON.parse(fs.readFileSync('github-release.json', 'utf8'));
            if (release.tagName !== 'v1.0.1') throw new Error('Unexpected release tag');
            if (release.isDraft || release.isPrerelease) {
              throw new Error('Existing GitHub Release must be final');
            }
            NODE
          fi

      - name: Create or update final GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          ASSETS=(
            release-artifacts/npm/expflow-1.0.1.tgz
            release-artifacts/python/expflow_hooks-1.0.1.tar.gz
            release-artifacts/python/expflow_hooks-1.0.1-py3-none-any.whl
            release-artifacts/SHA256SUMS
            release-artifacts/release-manifest.json
          )
          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release edit "${RELEASE_TAG}" \
              --title "Expflow v1.0.1" \
              --notes-file docs/release_notes/GITHUB_RELEASE_NOTE_V1_0_1.md \
              --latest
            for asset in "${ASSETS[@]}"; do
              name="$(basename "${asset}")"
              if gh release view "${RELEASE_TAG}" --json assets --jq '.assets[].name' | grep -Fxq "${name}"; then
                echo "Release asset ${name} already exists; leaving it unchanged"
              else
                gh release upload "${RELEASE_TAG}" "${asset}"
              fi
            done
          else
            gh release create "${RELEASE_TAG}" "${ASSETS[@]}" \
              --title "Expflow v1.0.1" \
              --notes-file docs/release_notes/GITHUB_RELEASE_NOTE_V1_0_1.md \
              --verify-tag
          fi
