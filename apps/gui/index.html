<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Expflow GUI</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <!-- Header -->
      <header class="topbar">
        <div>
          <h1>Expflow GUI</h1>
          <span id="version-badge" class="badge">v1.2.3</span>
        </div>
        <label class="root-field">
          <span>Project root</span>
          <input
            id="project-root"
            type="text"
            autocomplete="off"
            spellcheck="false"
            placeholder="C:\path\to\project"
          />
        </label>
        <div class="header-actions">
          <button id="refresh-button" title="Refresh (Ctrl+R)">🔄</button>
          <button id="logs-button" title="View Logs">📋</button>
          <span id="status-pill" class="status-pill">disconnected</span>
        </div>
      </header>

      <!-- Sidebar + Workspace -->
      <div class="body-layout">
        <nav class="sidebar" aria-label="Command families">
          <h3>Command Families</h3>
          <ul id="family-list"></ul>
        </nav>

        <section class="workspace">
          <!-- Command list -->
          <div id="command-panel" class="panel">
            <h3 id="family-title">Select a family</h3>
            <ul id="command-list" class="command-list"></ul>
          </div>

          <!-- Options -->
          <div id="options-panel" class="panel" style="display: none">
            <h3>Options</h3>
            <div id="options-fields"></div>
          </div>

          <!-- Plan preview -->
          <div id="plan-panel" class="panel" style="display: none">
            <h3>Plan Preview</h3>
            <div id="plan-content" class="empty-state">Run Preview to see what will change.</div>
            <div class="button-row">
              <button id="preview-button" type="button">Preview</button>
              <button id="apply-button" type="button" disabled>Apply</button>
            </div>
          </div>

          <!-- Results & Receipt -->
          <div id="result-panel" class="panel" style="display: none">
            <h3>Result</h3>
            <div id="result-content" class="empty-state">No result yet.</div>
            <details>
              <summary>Receipt (JSON)</summary>
              <pre id="receipt-content" class="technical-output">{}</pre>
            </details>
          </div>
        </section>
      </div>

      <!-- Footer -->
      <footer class="bottombar">
        <span>Expflow GUI — complete CLI parity</span>
        <span id="shortcut-hint">Ctrl+R Refresh · Esc Cancel</span>
      </footer>
    </main>
    <script type="module" src="./src/app.js"></script>
  </body>
</html>
