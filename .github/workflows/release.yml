name: Release

on:
  push:
    tags:
      - 'v*.*.*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  NPM_PACKAGE: expflow
  PYPI_PACKAGE: expflow-hooks
  PYTHON_IMPORT: expflow_hooks

jobs:
  build-release:
    name: Build release artifacts
    runs-on: ubuntu-latest
    outputs:
      commit-sha: ${{ steps.identity.outputs.commit_sha }}
      npm-version: ${{ steps.versions.outputs.npm_version }}
      python-version: ${{ steps.versions.outputs.python_version }}
      skip-python: ${{ steps.versions.outputs.skip_python }}
    steps:
      - name: Check out tag
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 24
          cache: ''

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'

      - name: Verify release identity
        id: identity
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_TYPE}" != "tag" ]]; then
            echo "Release workflow must run from a tag" >&2
            exit 1
          fi
          if [[ ! "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Tag must match vMAJOR.MINOR.PATCH" >&2
            exit 1
          fi
          git fetch origin main
          TAG_SHA="$(git rev-parse HEAD)"
          MAIN_SHA="$(git rev-parse origin/main)"
          if [[ "${TAG_SHA}" != "${MAIN_SHA}" ]]; then
            echo "Tag commit ${TAG_SHA} differs from origin/main ${MAIN_SHA}" >&2
            exit 1
          fi
          echo "commit_sha=${TAG_SHA}" >> "${GITHUB_OUTPUT}"

      - name: Determine versions
        id: versions
        run: |
          set -euo pipefail
          NPM_VERSION="$(node -e "console.log(require('./package.json').version)")"
          PYTHON_VERSION="$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml'))['project']['version'])")"
          echo "npm_version=${NPM_VERSION}" >> "${GITHUB_OUTPUT}"
          echo "python_version=${PYTHON_VERSION}" >> "${GITHUB_OUTPUT}"

          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [[ "${NPM_VERSION}" != "${TAG_VERSION}" ]]; then
            echo "npm version ${NPM_VERSION} does not match tag ${GITHUB_REF_NAME}" >&2
            exit 1
          fi

          # Determine if Python needs publishing (version matches tag)
          if [[ "${PYTHON_VERSION}" == "${TAG_VERSION}" ]]; then
            echo "skip_python=false" >> "${GITHUB_OUTPUT}"
            echo "Python version ${PYTHON_VERSION} matches tag; will publish Python"
          else
            echo "skip_python=true" >> "${GITHUB_OUTPUT}"
            echo "Python version ${PYTHON_VERSION} differs from tag ${GITHUB_REF_NAME}; skipping Python publication"
          fi

      - name: Verify package metadata
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import pathlib
          import re
          import tomllib

          root = pathlib.Path(".")
          package_json = json.loads((root / "package.json").read_text())
          pyproject = tomllib.loads((root / "pyproject.toml").read_text())
          version_ts = (root / "src" / "core" / "version.ts").read_text()

          assert package_json["name"] == "expflow"
          assert package_json["license"] == "MIT"
          assert package_json.get("publishConfig", {}).get("access") == "public"
          assert pyproject["project"]["name"] == "expflow-hooks"
          assert pyproject["project"]["license"] == "MIT"

          npm_version = package_json["version"]
          assert re.search(rf"VERSION\s*=\s*'{npm_version}'", version_ts), \
              f"version.ts VERSION does not match package.json version {npm_version}"
          print(f"npm version: {npm_version}")
          print(f"python version: {pyproject['project']['version']}")
          PY

      - name: Install Node dependencies
        run: npm ci

      - name: Full repository validation
        run: npm run validate

      - name: Install Python release dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Python tests
        run: python -m pytest

      - name: Build TypeScript
        run: npm run build

      - name: Build exact npm tarball
        id: npm_pack
        run: |
          set -euo pipefail
          NPM_VERSION="${{ steps.versions.outputs.npm_version }}"
          mkdir -p release-artifacts/npm
          NPM_TARBALL_NAME="$(npm pack --pack-destination release-artifacts/npm)"
          NPM_TARBALL="release-artifacts/npm/${NPM_TARBALL_NAME}"
          test -f "${NPM_TARBALL}"
          EXPECTED="expflow-${NPM_VERSION}.tgz"
          if [[ "${NPM_TARBALL_NAME}" != "${EXPECTED}" ]]; then
            echo "Unexpected npm tarball ${NPM_TARBALL_NAME}" >&2
            exit 1
          fi
          echo "tarball=${NPM_TARBALL}" >> "${GITHUB_OUTPUT}"

      - name: Build exact Python distributions
        if: steps.versions.outputs.skip_python != 'true'
        run: |
          set -euo pipefail
          PYTHON_VERSION="${{ steps.versions.outputs.python_version }}"
          mkdir -p release-artifacts/python-built
          python -m build --sdist --wheel --outdir release-artifacts/python-built
          test -f "release-artifacts/python-built/expflow_hooks-${PYTHON_VERSION}-py3-none-any.whl"
          test -f "release-artifacts/python-built/expflow_hooks-${PYTHON_VERSION}.tar.gz"

      - name: Select Python release artifacts
        if: steps.versions.outputs.skip_python != 'true'
        run: |
          set -euo pipefail
          PYTHON_VERSION="${{ steps.versions.outputs.python_version }}"
          python - <<'PY'
          import json
          import os
          import pathlib
          import shutil
          import urllib.error
          import urllib.request

          project = "expflow-hooks"
          version = os.environ["PYTHON_VERSION"]
          expected = {
              f"expflow_hooks-{version}-py3-none-any.whl",
              f"expflow_hooks-{version}.tar.gz",
          }
          built_dir = pathlib.Path("release-artifacts/python-built")
          target_dir = pathlib.Path("release-artifacts/python")
          registry_url = f"https://pypi.org/pypi/{project}/{version}/json"

          try:
              with urllib.request.urlopen(registry_url, timeout=30) as response:
                  pypi_data = json.load(response)
          except urllib.error.HTTPError as exc:
              if exc.code == 404:
                  pypi_data = None
              else:
                  raise

          if pypi_data is None:
              for filename in expected:
                  shutil.copy2(built_dir / filename, target_dir / filename)
              pathlib.Path("release-artifacts/python-artifact-source.txt").write_text(
                  "local-build\n",
              )
          else:
              urls = {
                  file_info["filename"]: file_info["url"]
                  for file_info in pypi_data.get("urls", [])
                  if file_info.get("filename") in expected
              }
              missing = expected - set(urls)
              if missing:
                  raise SystemExit(f"Missing PyPI files: {sorted(missing)}")
              for filename, url in urls.items():
                  with urllib.request.urlopen(url, timeout=60) as response:
                      (target_dir / filename).write_bytes(response.read())
              pathlib.Path("release-artifacts/python-artifact-source.txt").write_text(
                  "pypi\n",
              )
          PY

      - name: Check Python distribution metadata
        if: steps.versions.outputs.skip_python != 'true'
        run: python -m twine check release-artifacts/python/*

      - name: Verify exact npm tarball externally
        run: npx tsx tests/contracts/package-verify.ts --tarball "${{ steps.npm_pack.outputs.tarball }}"

      - name: Verify exact Python wheel externally
        if: steps.versions.outputs.skip_python != 'true'
        run: |
          PYTHON_VERSION="${{ steps.versions.outputs.python_version }}"
          python tests/contracts/verify_python_wheel.py --wheel "release-artifacts/python/expflow_hooks-${PYTHON_VERSION}-py3-none-any.whl"

      - name: Generate release checksums and manifest
        run: |
          set -euo pipefail
          NPM_VERSION="${{ steps.versions.outputs.npm_version }}"
          PYTHON_VERSION="${{ steps.versions.outputs.python_version }}"
          SKIP_PYTHON="${{ steps.versions.outputs.skip_python }}"
          node --input-type=module <<'NODE'
          import { createHash } from 'node:crypto';
          import { execSync } from 'node:child_process';
          import { readFileSync, writeFileSync } from 'node:fs';

          const npmVersion = process.env.NPM_VERSION;
          const pythonVersion = process.env.PYTHON_VERSION;
          const skipPython = process.env.SKIP_PYTHON === 'true';

          const artifactPaths = [
            `release-artifacts/npm/expflow-${npmVersion}.tgz`,
          ];

          if (!skipPython) {
            artifactPaths.push(
              `release-artifacts/python/expflow_hooks-${pythonVersion}.tar.gz`,
              `release-artifacts/python/expflow_hooks-${pythonVersion}-py3-none-any.whl`,
            );
          }

          const digest = (path) =>
            createHash('sha256').update(readFileSync(path)).digest('hex');

          const sh = (command) => execSync(command, { encoding: 'utf8' }).trim();

          const packages = {
            npm: { name: process.env.NPM_PACKAGE, version: npmVersion },
          };
          if (!skipPython) {
            packages.pypi = { name: process.env.PYPI_PACKAGE, version: pythonVersion };
          }

          const manifest = {
            repository: 'paragon-ux/Expflow',
            commit_sha: process.env.GITHUB_SHA,
            tag: process.env.GITHUB_REF_NAME,
            packages,
            artifacts: artifactPaths.map((path) => ({
              path: path.replace('release-artifacts/', ''),
              sha256: digest(path),
            })),
            build_tools: {
              node: sh('node --version'),
              npm: sh('npm --version'),
              python: sh('python --version'),
            },
            validation_summary: [
              'npm ci',
              'npm run validate',
              'python -m pytest',
              'external npm tarball verification',
            ],
          };

          writeFileSync(
            'release-artifacts/release-manifest.json',
            JSON.stringify(manifest, null, 2) + '\n',
          );
          NODE
          (
            cd release-artifacts
            sha256sum npm/*.tgz release-manifest.json > SHA256SUMS
            sha256sum -c SHA256SUMS
          )

      - name: Upload release artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: release-artifacts-${{ github.ref_name }}
          path: release-artifacts/
          if-no-files-found: error
          retention-days: 90

  attest-release:
    name: Attest release artifacts
    runs-on: ubuntu-latest
    needs: build-release
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: release-artifacts-${{ github.ref_name }}
          path: release-artifacts

      - name: Verify checksums
        run: |
          set -euo pipefail
          cd release-artifacts
          sha256sum -c SHA256SUMS

      - name: Attest npm tarball
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2.4.0
        with:
          subject-path: release-artifacts/npm/expflow-${{ needs.build-release.outputs.npm-version }}.tgz

      - name: Attest release manifest
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2.4.0
        with:
          subject-path: release-artifacts/release-manifest.json

  publish-npm:
    name: Publish npm package
    runs-on: ubuntu-latest
    needs: [build-release, attest-release]
    environment: release-npm
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: ''

      - name: Install npm 11.18.0
        run: npm install --global npm@11.18.0

      - name: Download release artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: release-artifacts-${{ github.ref_name }}
          path: release-artifacts

      - name: Verify checksums
        run: |
          set -euo pipefail
          cd release-artifacts
          sha256sum -c SHA256SUMS

      - name: Publish or verify npm package
        run: |
          set -euo pipefail
          NPM_VERSION="${{ needs.build-release.outputs.npm-version }}"
          TARBALL="release-artifacts/npm/expflow-${NPM_VERSION}.tgz"
          if [[ ! -f "${TARBALL}" ]]; then
            echo "Missing ${TARBALL}" >&2
            exit 1
          fi
          node - <<'NODE'
          const fs = require('fs');
          const tarball = `release-artifacts/npm/expflow-${process.env.NPM_VERSION}.tgz`;
          if (!fs.existsSync(tarball)) process.exit(1);
          NODE
          if npm view "expflow@${NPM_VERSION}" version --json > npm-existing.json 2>/dev/null; then
            echo "expflow@${NPM_VERSION} already exists; verifying metadata"
            PUBLISHED="already-published"
          else
            unset NODE_AUTH_TOKEN
            npm publish "${TARBALL}" --access public
            PUBLISHED="published"
          fi
          npm view "expflow@${NPM_VERSION}" --json > npm-metadata.json
          node <<'NODE'
          const fs = require('fs');
          const metadata = JSON.parse(fs.readFileSync('npm-metadata.json', 'utf8'));
          if (metadata.name !== 'expflow') throw new Error('Unexpected npm package name');
          if (metadata.version !== process.env.NPM_VERSION) throw new Error('Unexpected npm version');
          if (metadata.license !== 'MIT') throw new Error('Unexpected npm license');
          if (!metadata.dist?.tarball || !metadata.dist?.integrity) {
            throw new Error('Missing npm dist tarball or integrity');
          }
          const repo = metadata.repository?.url || '';
          if (!repo.includes('github.com/paragon-ux/Expflow')) {
            throw new Error(`Unexpected npm repository metadata: ${repo}`);
          }
          NODE
          TARBALL_URL="$(node -e "console.log(JSON.parse(require('fs').readFileSync('npm-metadata.json', 'utf8')).dist.tarball)")"
          curl -fsSL "${TARBALL_URL}" -o npm-registry.tgz
          test "$(sha256sum "${TARBALL}" | cut -d' ' -f1)" = "$(sha256sum npm-registry.tgz | cut -d' ' -f1)"
          printf '{"package":"expflow","version":"%s","status":"%s"}\n' "${NPM_VERSION}" "${PUBLISHED}" > npm-publication-result.json

      - name: Upload npm publication result
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: npm-publication-result-${{ github.ref_name }}
          path: |
            npm-publication-result.json
            npm-metadata.json
          if-no-files-found: error

  publish-pypi:
    name: Publish PyPI package
    runs-on: ubuntu-latest
    needs: [build-release, attest-release]
    if: needs.build-release.outputs.skip-python != 'true'
    environment: release-pypi
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'

      - name: Download release artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: release-artifacts-${{ github.ref_name }}
          path: release-artifacts

      - name: Verify checksums
        run: |
          set -euo pipefail
          cd release-artifacts
          sha256sum -c SHA256SUMS

      - name: Check PyPI version state
        id: pypi_state
        run: |
          set -euo pipefail
          PYTHON_VERSION="${{ needs.build-release.outputs.python-version }}"
          python - <<'PY' > pypi-state.json
          import json
          import os
          import urllib.error
          import urllib.request

          url = f"https://pypi.org/pypi/expflow-hooks/{os.environ['PYTHON_VERSION']}/json"
          try:
              with urllib.request.urlopen(url, timeout=30) as response:
                  data = json.load(response)
              print(json.dumps({"exists": True, "info": data.get("info", {})}))
          except urllib.error.HTTPError as exc:
              if exc.code == 404:
                  print(json.dumps({"exists": False}))
              else:
                  raise
          PY
          EXISTS="$(python -c "import json; print(str(json.load(open('pypi-state.json'))['exists']).lower())")"
          echo "exists=${EXISTS}" >> "${GITHUB_OUTPUT}"

      - name: Publish PyPI package
        if: steps.pypi_state.outputs.exists != 'true'
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          packages-dir: release-artifacts/python/
          attestations: true
          print-hash: true

      - name: Verify PyPI publication
        run: |
          set -euo pipefail
          PYTHON_VERSION="${{ needs.build-release.outputs.python-version }}"
          python - <<'PY'
          import json
          import os
          import pathlib
          import subprocess
          import sys
          import time
          import urllib.error
          import urllib.request

          url = f"https://pypi.org/pypi/expflow-hooks/{os.environ['PYTHON_VERSION']}/json"
          last_error = None
          for attempt in range(12):
              try:
                  with urllib.request.urlopen(url, timeout=60) as response:
                      data = json.load(response)
                  break
              except urllib.error.HTTPError as exc:
                  last_error = exc
                  if exc.code != 404 or attempt == 11:
                      raise
                  time.sleep(10)
          else:
              raise last_error
          info = data.get("info", {})
          if info.get("name") != "expflow-hooks":
              raise SystemExit("Unexpected PyPI project name")
          if info.get("version") != os.environ["PYTHON_VERSION"]:
              raise SystemExit("Unexpected PyPI version")

          pathlib.Path("pypi-publication-result.json").write_text(
              json.dumps({"package": "expflow-hooks", "version": os.environ["PYTHON_VERSION"], "status": "verified"}, indent=2)
              + "\n"
          )
          pathlib.Path("pypi-metadata.json").write_text(json.dumps(data, indent=2) + "\n")
          PY

      - name: Upload PyPI publication result
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: pypi-publication-result-${{ github.ref_name }}
          path: |
            pypi-publication-result.json
            pypi-metadata.json
          if-no-files-found: error

  publish-github-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [build-release, publish-npm]
    permissions:
      contents: write
    steps:
      - name: Check out tag
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Download release artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: release-artifacts-${{ github.ref_name }}
          path: release-artifacts

      - name: Download npm publication result
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: npm-publication-result-${{ github.ref_name }}
          path: registry-results/npm

      - name: Verify release prerequisites
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git fetch origin main
          TAG_SHA="$(git rev-parse HEAD)"
          MAIN_SHA="$(git rev-parse origin/main)"
          if [[ "${TAG_SHA}" != "${MAIN_SHA}" ]]; then
            echo "Tag commit ${TAG_SHA} differs from origin/main ${MAIN_SHA}" >&2
            exit 1
          fi
          cd release-artifacts
          sha256sum -c SHA256SUMS
          cd ..
          test -f registry-results/npm/npm-publication-result.json

      - name: Create or update final GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          NPM_VERSION="${{ needs.build-release.outputs.npm-version }}"
          ASSETS=(
            "release-artifacts/npm/expflow-${NPM_VERSION}.tgz"
            release-artifacts/SHA256SUMS
            release-artifacts/release-manifest.json
          )
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release edit "${GITHUB_REF_NAME}" \
              --title "Expflow ${GITHUB_REF_NAME}" \
              --latest
            for asset in "${ASSETS[@]}"; do
              name="$(basename "${asset}")"
              if gh release view "${GITHUB_REF_NAME}" --json assets --jq '.assets[].name' | grep -Fxq "${name}"; then
                echo "Release asset ${name} already exists; leaving it unchanged"
              else
                gh release upload "${GITHUB_REF_NAME}" "${asset}"
              fi
            done
          else
            gh release create "${GITHUB_REF_NAME}" "${ASSETS[@]}" \
              --title "Expflow ${GITHUB_REF_NAME}" \
              --generate-notes \
              --verify-tag
          fi
