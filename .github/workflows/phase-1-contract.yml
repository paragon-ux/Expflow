name: Phase 1 Repository Contract

on:
  push:
    branches: [feature/expflow-phase-1-kickoff, main, 'codex/**']
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  contract:
    name: Contract Checks (Node ${{ matrix.node-version }}, Python ${{ matrix.python-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            node-version: '20'
            python-version: '3.11'
          - os: ubuntu-latest
            node-version: '22'
            python-version: '3.12'
          - os: windows-latest
            node-version: '20'
            python-version: '3.11'
          - os: macos-latest
            node-version: '20'
            python-version: '3.11'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Node dependencies (V01)
        run: npm ci

      - name: Config reference reconciliation (V00)
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          else
            BASE_SHA="${{ github.event.before }}"
            HEAD_SHA="${{ github.sha }}"
            if [[ "${BASE_SHA}" =~ ^0+$ ]]; then
              echo "Skipping config-reference check for initial push with all-zero before SHA."
              exit 0
            fi
          fi

          git cat-file -e "${BASE_SHA}^{commit}"
          git cat-file -e "${HEAD_SHA}^{commit}"
          npm run check:config-references -- --base "${BASE_SHA}" --head "${HEAD_SHA}"

      - name: Skill contract validation (V00)
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          else
            BASE_SHA="${{ github.event.before }}"
            HEAD_SHA="${{ github.sha }}"
            if [[ "${BASE_SHA}" =~ ^0+$ ]]; then
              echo "Skipping skill-contract check for initial push with all-zero before SHA."
              exit 0
            fi
          fi

          git cat-file -e "${BASE_SHA}^{commit}"
          git cat-file -e "${HEAD_SHA}^{commit}"
          npm run check:skill-contracts -- --base "${BASE_SHA}" --head "${HEAD_SHA}"

      - name: Format check (V02)
        run: npm run format:check

      - name: Lint (V03)
        run: npm run lint

      - name: Typecheck (V04)
        run: npm run typecheck

      - name: Node tests (V05)
        run: npm test

      - name: Contracts verify (V06)
        run: npm run contracts:verify

      - name: Registries verify (V07)
        run: npm run registries:verify

      - name: Schema meta-validate (V08)
        run: npm run schemas:meta-validate

      - name: Example index check (V09)
        run: npm run examples:index-check

      - name: Schema examples validate (V10)
        run: npm run schemas:examples-validate

      - name: Fixtures verify (V11)
        run: npm run fixtures:verify

      - name: Build (V12)
        run: npm run build

      - name: Package verify (V13)
        run: npm run package:verify

      - name: Python editable install (V14)
        run: python -m pip install -e ".[dev]"

      - name: Python tests (V15)
        run: python -m pytest

      - name: Python wheel build (V16)
        run: python -m build --wheel

  package-verify:
    name: External Package Verification (V13/V17)
    runs-on: ubuntu-latest
    needs: contract
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Node dependencies
        run: npm ci

      - name: Verify npm package outside checkout (V13)
        run: npm run package:verify

      - name: Verify Python wheel outside checkout (V17)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
          python tests/contracts/verify_python_wheel.py
